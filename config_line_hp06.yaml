# Configuration file for pillar_line.py - Emission Line Velocity Delay Map
# This file contains parameters for computing velocity delay maps of emission lines
# from AGN accretion disks with pillars.

# Disk Geometry Parameters (same as pillar_disk.py)
disk:
  rin: auto             # Inner radius (light days). Set to 'auto' to compute from M_BH and r_isco_rg
  rout: 20.0            # Outer radius (light days) - NGC 5548 BLR extent (Horne+2021)
  nr: 300               # Number of radial points
  nphi: 360             # Number of azimuthal points
  M_BH: 7.0e7           # SMBH mass (solar masses) - used to compute rin when rin='auto'
  r_isco_rg: 2          # ISCO radius in units of r_g (6=Schwarzschild, 1-6 for Kerr)

# Temperature Profile Parameters
temperature:
  h1: 0.05             # Height at reference radius (light days)
  r0: 20.0             # Reference radius (light days) - set to r_out
  beta: 10.0           # Height power-law index h = h1 * (r/r0)^beta
  tv1: 446.0           # Viscous temperature at r0 (K) — gives T_visc(1 ld) ≈ 4000 K
  alpha: 0.75          # Temperature power-law index (deprecated, now fixed at 0.75 for r^-3/4)
  tirrad_tvisc_ratio: 10.0  # Ratio T_irrad/T_visc at r0 (both follow r^-3/4)
                              # In shadows, T_irrad = 0, so only T_visc remains

# Lamp Parameters
lamp:
  hlamp: 0.05          # Lamp height (light days)
  tx1: 1e3             # Irradiation temperature at r0 (K) (deprecated, use tirrad_tvisc_ratio instead)
  flux_method: direct  # 'scale_temp' (legacy T-rescaling) or 'direct' (geometric lamp + Wien tail)
  log_phi_inner: 25.0  # Target log10(Phi) at r_in for Q calibration (clipped to Cloudy grid max=21)
  no_fluxfloor: true   # If true, shadow cells below Cloudy grid get zero emissivity (no clipping to 17)
  transparent: true    # If true, pillars transmit a fraction f_trans of lamp flux
  f_trans: 0.3        # Transmission fraction through pillar (0=opaque, 1=fully transparent)
  f_turb_line: 0.0    # Turbulent broadening: sigma_v = f_turb * v_Kep(r). 0=Keplerian only, 0.5=Gaussian-like

# Observation Parameters
observation:
  dmpc: 100.0          # Distance (Mpc)
  inclination: 45.0    # Inclination angle (degrees), 0=face-on, 90=edge-on
  fcol: 1.0            # Color temperature factor Tcol = fcol * Teff
  redshift: 0.0        # Redshift

# Pillar Parameters
# Two modes: manual placement or random generation
pillars:
  # Mode selection
  make_many: true        # If true, generate random pillars; if false, use manual list below
  
  # Manual pillar placement (used when make_many=false)
  # You can specify pillars in two ways:
  # 1. List format (old way - still supported):
  #    - r_pillar: 80.0
  #      phi_pillar: 0.0
  #      ...
  # 2. List-based format (new way - easier for multiple pillars):
  # r_pillar: [5.0, 10.0, 15.0]
  # phi_pillar: [pi/4, -pi/4, 3*pi/4]
  # height: [0.1, 0.1, 0.1]
  # sigma_r: [0.5, 0.5, 0.5] # in light days
  # sigma_phi: [1.0, 1.0, 1.0] # in radians
  # modify_height: [true, true, true]
  # modify_temp: [true, true, true]
  # temp_factor: [1, 1, 1]

  r_pillar: [4.0, 4.0]
  phi_pillar: [3*pi/4, 0]
  height: [0.15, 0.15]
  sigma_r: [0.5, 0.5] # in light days
  sigma_phi: [0.2, 0.2] # in radians
  modify_height: [true, true]
  modify_temp: [true, true]
  temp_factor: [5, 5]
  
  # Random pillar generation (used when make_many=true)
  N_pillar: 100           # Number of random pillars to generate
  r_mean: 10.0            # Mean radial position for Gaussian distribution (light days)
  sig_r: 5.0             # Standard deviation of radial position (light days)
  rmin: 2.0               # Minimum radius allowed for random pillars (light days)
  # phi is uniformly distributed from 0 to 2*pi (no parameters needed)
  h_pillar: 0.6           # Height of pillars (light days) - can be single value or list  [tall-pillar test, fiducial = 0.04]
  sigma_r_pillar: 0.1     # Radial width of each pillar (light days) - can be single value or list
  sigma_phi_pillar: 0.05   # Azimuthal width of each pillar (radians) - can be single value or list
  modify_height_pillar: true   # Whether to modify disk height
  modify_temp_pillar: true     # Whether to modify disk temperature
  temp_factor_pillar: 1     # Temperature enhancement factor (1 = no boost)

# Computation Parameters
computation:
  # Velocity delay map computation
  nlambda: 200          # Number of wavelength bins for velocity delay map
  ntau_line: 100        # Number of delay bins for velocity delay map (used in pillar_line.py)
  taumax: 50.0          # Maximum delay (days) for velocity-delay map (used in pillar_line.py)

  # Time-evolving Cloudy maps (pillar_line_time_cloudy.py)
  ntime: 100             # Number of time steps (Ntstep)
  tmax: 1200.0           # Maximum time (days) ~2 orbits at r_p=4 ld, M_BH=7e7
  # Optional: number of CPU cores for multiprocessing (None = auto-detect)
  # n_cores: 8

# Emission Line Parameters
emission_line:
  lambda0: 4861.0       # Rest wavelength of emission line (Angstroms)
                        # Common values:
                        #   Hβ (Balmer beta): 4861.0
                        #   Hα (Balmer alpha): 6563.0
                        #   C IV: 1549.0
                        #   Mg II: 2798.0
  M_BH: 7.0e7           # SMBH mass (solar masses) - NGC 5548 value from Horne+2021
                        # The Keplerian velocity is v(r) = sqrt(G*M_BH/r)
                        # At r0, this gives v_virial = sqrt(G*M_BH/r0)
                        # For M_BH=7e7 Msun, r0=50 ld: v_virial ~ 2680 km/s
  # v_virial: 1000.0    # Alternative: specify virial velocity directly (km/s)
                        # If M_BH is set, v_virial is computed from it and this is ignored

# Plotting Parameters
plotting:
  velocity_delay_filename: velocity_delay_map.png  # Output filename for velocity delay map
  plot_3d_geometry: true    # Whether to plot 3D disk geometry
  plot3d_filename: pillar_line_3d.png  # Output filename for 3D plot
  show_light_rays: true      # Whether to show light rays in 3D plot
  n_phi_plot: 360           # Number of azimuthal points for 3D plot
  n_r_plot: 200             # Number of radial points for 3D plot

